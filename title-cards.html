<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAD MEDIUM — TITLE CARDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="registry-container">

  <!-- Signal Registry entry card -->
  <div class="title-card glow">
    <span class="tc-series">Signal Registry</span>
    <span class="tc-id">DM-07</span>
    <span class="tc-name">CAIRN</span>
    <span class="tc-desc">Dual Quantizer / VCO</span>
    <span class="tc-url">dead-medium.com</span>
  </div>

  <!-- Field Test card -->
  <div class="title-card field-test glow">
    <span class="tc-series">Field Test</span>
    <span class="tc-id">DM-07 ◼ CAIRN</span>
    <span class="tc-name">FIRST POWER</span>
    <span class="tc-meta">REV 02 ◼ 2026.11.02</span>
    <span class="tc-url">dead-medium.com</span>
  </div>

  <!-- Intercept card -->
  <div class="title-card intercept glow">
    <span class="tc-series">Intercept</span>
    <div class="tc-intercept-header">2026.11.15</div>
    <div class="tc-signal">FM BROADCAST ◼ 91.3 MHz</div>
    <div class="tc-route"><span class="arrow">→</span> DM-04 TETHER</div>
    <span class="tc-url">dead-medium.com</span>
  </div>

</div><!-- /.registry-container -->

</body>
</html>
